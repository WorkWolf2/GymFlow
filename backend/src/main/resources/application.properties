# Spring Application
spring.application.name=gymsaas

# Datasource Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gymsaas}
spring.datasource.username=${DB_USER:gymsaas}
spring.datasource.password=${DB_PASSWORD:gymsaas_dev}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Multipart Files
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB


# Cache
spring.cache.type=simple

# Server Configuration
server.port=${SERVER_PORT:8080}
server.error.include-message=always

# JWT Configuration (Custom)
jwt.secret=${JWT_SECRET:gymsaas-super-secret-key-change-in-production-minimum-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# MinIO Configuration (Custom)
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
minio.bucket=${MINIO_BUCKET:gymsaas}

# NFC Configuration (Custom)
nfc.tcp.port=${NFC_TCP_PORT:2169}
nfc.tcp.host=${NFC_TCP_HOST:0.0.0.0}
nfc.tcp.enabled=${NFC_ENABLED:true}

# Local access bridge used by the on-premise Python service
access.bridge.api-key=${ACCESS_BRIDGE_API_KEY:}
access.bridge.relay-seconds=${ACCESS_BRIDGE_RELAY_SECONDS:3}

# Management / Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.minegolem.backend=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

spring.config.import=optional:file:.env

# Database Backup Configuration
backup.database.enabled=${BACKUP_ENABLED:true}
backup.database.directory=${BACKUP_DIRECTORY:database-backups}
backup.database.max-files=${BACKUP_MAX_FILES:10}
backup.database.cron=${BACKUP_CRON:0 0 22 * * *}
backup.database.pg-dump-command=${PG_DUMP_COMMAND:pg_dump}
