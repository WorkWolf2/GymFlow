<div th:fragment="sidebar" id="sidebar" class="flex flex-col bg-background-secondary border-r border-surface-border transition-[width,background-color] duration-150 ease-in-out w-60">
    <!-- Logo -->
    <div class="flex items-center gap-2.5 px-4 h-14 border-b border-surface-border shrink-0">
        <div class="w-7 h-7 bg-transparent flex items-center justify-center shrink-0">
            <img th:src="@{/images/logo.png}" alt="Logo" class="w-full h-full object-contain rounded-sm">
        </div>
        <span class="font-semibold text-foreground text-sm sidebar-text">LegionAsd</span>
    </div>

    <!-- Nav -->
    <nav class="flex-1 py-3 px-2 space-y-0.5 overflow-y-auto" id="sidebar-nav">
        <!-- Dashboard -->
        <a th:href="@{/}" class="flex min-h-10 items-center gap-3 px-2.5 py-2 rounded text-sm transition-[color,background-color] duration-100"
           th:classappend="${currentPath == '/' or currentPath == '/dashboard'} ? 'bg-accent-muted text-accent font-medium' : 'text-foreground-muted hover:text-foreground hover:bg-surface-hover'">
            <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i>
            <span class="sidebar-text">Dashboard</span>
        </a>
        
        <!-- Clienti -->
        <a th:href="@{/clients}" class="flex min-h-10 items-center gap-3 px-2.5 py-2 rounded text-sm transition-[color,background-color] duration-100"
           th:classappend="${#strings.startsWith(currentPath, '/clients')} ? 'bg-accent-muted text-accent font-medium' : 'text-foreground-muted hover:text-foreground hover:bg-surface-hover'">
            <i data-lucide="users" class="w-4 h-4 shrink-0"></i>
            <span class="sidebar-text">Clienti</span>
        </a>

        <!-- Accessi -->
        <a th:href="@{/accesses}" class="flex min-h-10 items-center gap-3 px-2.5 py-2 rounded text-sm transition-[color,background-color] duration-100"
           th:classappend="${#strings.startsWith(currentPath, '/accesses')} ? 'bg-accent-muted text-accent font-medium' : 'text-foreground-muted hover:text-foreground hover:bg-surface-hover'">
            <i data-lucide="door-open" class="w-4 h-4 shrink-0"></i>
            <span class="sidebar-text">Accessi</span>
        </a>

        <!-- Incassi -->
        <a th:href="@{/payments}" class="flex min-h-10 items-center gap-3 px-2.5 py-2 rounded text-sm transition-[color,background-color] duration-100"
           th:classappend="${#strings.startsWith(currentPath, '/payments')} ? 'bg-accent-muted text-accent font-medium' : 'text-foreground-muted hover:text-foreground hover:bg-surface-hover'">
            <i data-lucide="credit-card" class="w-4 h-4 shrink-0"></i>
            <span class="sidebar-text">Incassi</span>
        </a>

        <!-- Abbonamenti -->
        <a th:href="@{/subscriptions}" class="flex min-h-10 items-center gap-3 px-2.5 py-2 rounded text-sm transition-[color,background-color] duration-100"
           th:classappend="${#strings.startsWith(currentPath, '/subscriptions')} ? 'bg-accent-muted text-accent font-medium' : 'text-foreground-muted hover:text-foreground hover:bg-surface-hover'">
            <i data-lucide="dumbbell" class="w-4 h-4 shrink-0"></i>
            <span class="sidebar-text">Abbonamenti</span>
        </a>

        <!-- Report -->
        <a th:href="@{/reports}" class="flex min-h-10 items-center gap-3 px-2.5 py-2 rounded text-sm transition-[color,background-color] duration-100"
           th:classappend="${#strings.startsWith(currentPath, '/reports')} ? 'bg-accent-muted text-accent font-medium' : 'text-foreground-muted hover:text-foreground hover:bg-surface-hover'">
            <i data-lucide="file-chart-column" class="w-4 h-4 shrink-0"></i>
            <span class="sidebar-text">Report</span>
        </a>

        <!-- Email -->
        <a th:href="@{/emails}" class="flex min-h-10 items-center gap-3 px-2.5 py-2 rounded text-sm transition-[color,background-color] duration-100"
           th:classappend="${#strings.startsWith(currentPath, '/emails')} ? 'bg-accent-muted text-accent font-medium' : 'text-foreground-muted hover:text-foreground hover:bg-surface-hover'">
            <i data-lucide="mail" class="w-4 h-4 shrink-0"></i>
            <span class="sidebar-text">Email</span>
        </a>

        <!-- Impostazioni -->
        <a th:href="@{/settings}" class="flex min-h-10 items-center gap-3 px-2.5 py-2 rounded text-sm transition-[color,background-color] duration-100"
           th:classappend="${#strings.startsWith(currentPath, '/settings')} ? 'bg-accent-muted text-accent font-medium' : 'text-foreground-muted hover:text-foreground hover:bg-surface-hover'">
            <i data-lucide="settings" class="w-4 h-4 shrink-0"></i>
            <span class="sidebar-text">Impostazioni</span>
        </a>
    </nav>

    <!-- Bottom -->
    <div class="border-t border-surface-border px-2 py-2 space-y-1">
        <div class="px-2.5 py-1.5 mb-1 sidebar-text user-info-container">
            <p class="text-xs text-foreground font-medium truncate" id="current-user-name">Caricamento...</p>
            <p class="text-xs text-foreground-subtle truncate" id="current-user-role">Ruolo</p>
        </div>
        
        <button id="logout-btn" class="flex min-h-10 items-center gap-3 w-full px-2.5 py-2 rounded text-sm text-foreground-muted hover:text-danger hover:bg-danger-bg active:scale-[0.96] transition-[scale,color,background-color] duration-150 ease-out">
            <i data-lucide="log-out" class="w-4 h-4 shrink-0"></i>
            <span class="sidebar-text">Logout</span>
        </button>
        
        <button id="toggle-sidebar" class="flex min-h-10 items-center gap-3 w-full px-2.5 py-2 rounded text-sm text-foreground-subtle hover:text-foreground hover:bg-surface-hover active:scale-[0.96] transition-[scale,color,background-color] duration-150 ease-out">
            <i data-lucide="chevron-left" class="w-4 h-4 shrink-0" id="toggle-sidebar-icon"></i>
            <span class="sidebar-text">Comprimi</span>
        </button>
    </div>

    <script>
        $(document).ready(function() {
            let collapsed = false;
            
            $('#toggle-sidebar').click(function() {
                collapsed = !collapsed;
                const sidebar = $('#sidebar');
                const texts = $('.sidebar-text');
                const icon = $('#toggle-sidebar-icon');
                
                if (collapsed) {
                    sidebar.removeClass('w-60').addClass('w-14');
                    texts.hide();
                    icon.replaceWith('<i data-lucide="chevron-right" class="w-4 h-4 shrink-0" id="toggle-sidebar-icon"></i>');
                    $('#sidebar-nav a').each(function() {
                        $(this).attr('title', $(this).find('span').text());
                    });
                } else {
                    sidebar.removeClass('w-14').addClass('w-60');
                    texts.show();
                    icon.replaceWith('<i data-lucide="chevron-left" class="w-4 h-4 shrink-0" id="toggle-sidebar-icon"></i>');
                    $('#sidebar-nav a').removeAttr('title');
                }
                lucide.createIcons();
            });

            // Handle Logout
            $('#logout-btn').click(function() {
                // Clear local storage and redirect to login
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('refresh_token');
                localStorage.removeItem('user_full_name');
                localStorage.removeItem('user_role');
                window.location.href = '/login';
            });
            
            // Load user info if token exists
            const token = localStorage.getItem('jwt_token');
            if (token) {
                $('#current-user-name').text(localStorage.getItem('user_full_name') || 'Utente');
                $('#current-user-role').text(localStorage.getItem('user_role') || 'Staff');
                // Decode JWT to get user info (basic decode)
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if(payload.fullName) {
                        $('#current-user-name').text(payload.fullName);
                    }
                    if(payload.role) {
                        $('#current-user-role').text(payload.role);
                    }
                } catch(e) {
                    console.error("Invalid token format", e);
                }
            } else {
                // If not on login page, redirect
                if (window.location.pathname !== '/login') {
                    window.location.href = '/login';
                }
            }
        });
    </script>
</div>
