
services:
  postgres:
    image: postgres:16-alpine
    container_name: gymsaas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gymsaas
      POSTGRES_USER: gymsaas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gymsaas_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymsaas -d gymsaas"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gymsaas-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymsaas-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gymsaas
      DB_USER: gymsaas
      DB_PASSWORD: ${DB_PASSWORD:-gymsaas_dev}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-minimum-256-bits-long-secret-key}
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin123}
      MINIO_BUCKET: gymsaas
      NFC_TCP_PORT: 2169
      NFC_ENABLED: true
      NFC_DEFAULT_GYM_ID: 00000000-0000-0000-0000-000000000001
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
      - "2169:2169"
    volumes:
      - backup_data:/app/database-backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
    name: gymsaas_postgres_data
  minio_data:
    name: gymsaas_minio_data
  backup_data:
    name: gymsaas_backup_data
